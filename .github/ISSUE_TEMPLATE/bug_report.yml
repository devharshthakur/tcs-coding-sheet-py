---
name: Bug report
description: Report a bug or unexpected behavior
title: 'fix: '
labels: [issue:accepted, bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Proposed Fix
      description: How you think this should be solved.
      placeholder: Suggest a possible fix, if you have one.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any extra context, logs, or screenshots.
    validations:
      required: false
